services:
  postgres:
    image: postgres:16-alpine
    container_name: fixit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fixit
      POSTGRES_PASSWORD: fixit
      POSTGRES_DB: fixit
    ports:
      - "5432:5432"
    volumes:
      - fixit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fixit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fixit_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fixit_pgdata:
  fixit_redisdata:
